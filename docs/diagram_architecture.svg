<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="Segoe UI, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrowA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e293b"/>
    </marker>
    <marker id="arrowDash" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
    <style>
      .service { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; }
      .broker { fill: #fef3c7; stroke: #b45309; stroke-width: 3; }
      .dashboard { fill: #d1fae5; stroke: #047857; stroke-width: 2; }
      .client { fill: #fce7f3; stroke: #be185d; stroke-width: 2; }
      .label { fill: #1e293b; font-weight: 600; text-anchor: middle; }
      .label-bold { fill: #1e293b; font-weight: 700; text-anchor: middle; font-size: 14px; }
      .label-small { fill: #475569; font-size: 11px; text-anchor: middle; }
      .edge { stroke: #1e293b; stroke-width: 1.5; fill: none; }
      .edge-pub { stroke: #b45309; stroke-width: 2; fill: none; stroke-dasharray: 6,4; }
      .edge-ws { stroke: #7c3aed; stroke-width: 2; fill: none; }
      .topic-label { fill: #b45309; font-weight: 600; font-size: 11px; text-anchor: middle; }
    </style>
  </defs>

  <text x="500" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">
    4-Rasm: HotelOS Mikroservis Arxitekturasi — Yuqori Darajadagi Ko'rinish
  </text>
  <text x="500" y="52" text-anchor="middle" font-size="12" fill="#64748b">
    4 ta mikroservis · Redis Pub/Sub broker · WebSocket panel · 3 ta paradigma birgalikda
  </text>

  <!-- Broker -->
  <rect x="370" y="290" width="260" height="120" rx="8" class="broker"/>
  <text x="500" y="320" class="label-bold">Redis Pub/Sub Broker</text>
  <text x="500" y="340" class="label-small">localhost:6379 · markaziy hodisa kanali</text>
  <text x="500" y="362" class="label-small">Mavzular (topics):</text>
  <text x="500" y="378" class="label-small">room.*, order.*, issue.*, guest.*</text>
  <text x="500" y="395" class="label-small">13 ta hodisa nomi · shared/events.py</text>

  <!-- 4 Services -->
  <!-- Reception (left top) -->
  <rect x="70" y="100" width="200" height="110" rx="8" class="service"/>
  <text x="170" y="125" class="label-bold">Reception Service</text>
  <text x="170" y="142" class="label-small">:8001 / FastAPI</text>
  <text x="170" y="160" class="label">assign_room()</text>
  <text x="170" y="178" class="label">calculate_bill()</text>
  <text x="170" y="196" class="label-small">120 xonali inventar</text>

  <!-- Housekeeping (right top) -->
  <rect x="730" y="100" width="200" height="110" rx="8" class="service"/>
  <text x="830" y="125" class="label-bold">Housekeeping Service</text>
  <text x="830" y="142" class="label-small">:8002 / FastAPI</text>
  <text x="830" y="160" class="label">CleaningQueue</text>
  <text x="830" y="178" class="label-small">FIFO deque</text>
  <text x="830" y="196" class="label-small">Iflos→Tozalanmoqda→Toza</text>

  <!-- Room Service (left bottom) -->
  <rect x="70" y="490" width="200" height="110" rx="8" class="service"/>
  <text x="170" y="515" class="label-bold">Room Service</text>
  <text x="170" y="532" class="label-small">:8003 / FastAPI</text>
  <text x="170" y="550" class="label">OrderRegistry</text>
  <text x="170" y="568" class="label-small">Qabul→Tayyor→Yetkaz→Tugadi</text>
  <text x="170" y="586" class="label-small">menu.json lookup</text>

  <!-- Maintenance (right bottom) -->
  <rect x="730" y="490" width="200" height="110" rx="8" class="service"/>
  <text x="830" y="515" class="label-bold">Maintenance Service</text>
  <text x="830" y="532" class="label-small">:8004 / FastAPI</text>
  <text x="830" y="550" class="label">IssuePriorityQueue</text>
  <text x="830" y="568" class="label-small">min-heap (heapq)</text>
  <text x="830" y="586" class="label-small">Critical&gt;High&gt;Normal&gt;Low + FIFO</text>

  <!-- Dashboard -->
  <rect x="380" y="490" width="240" height="120" rx="8" class="dashboard"/>
  <text x="500" y="515" class="label-bold">Dashboard Service</text>
  <text x="500" y="532" class="label-small">:8000 / FastAPI + WebSocket</text>
  <text x="500" y="550" class="label">DashboardState</text>
  <text x="500" y="568" class="label">ConnectionManager</text>
  <text x="500" y="586" class="label-small">JWT auth · barcha hodisalarga obuna</text>

  <!-- Browser -->
  <rect x="380" y="640" width="100" height="50" rx="8" class="client"/>
  <text x="430" y="660" class="label-bold">Brauzer</text>
  <text x="430" y="678" class="label-small">HTML+JS+Tailwind</text>

  <!-- Terminal -->
  <rect x="520" y="640" width="100" height="50" rx="8" class="client"/>
  <text x="570" y="660" class="label-bold">Terminal</text>
  <text x="570" y="678" class="label-small">rich TUI</text>

  <!-- Pub/Sub edges -->
  <!-- Reception -> Broker -->
  <line x1="270" y1="155" x2="380" y2="300" class="edge-pub" marker-end="url(#arrowDash)"/>
  <text x="290" y="220" class="topic-label">room.occupied,</text>
  <text x="290" y="234" class="topic-label">room.vacated,</text>
  <text x="290" y="248" class="topic-label">guest.checked_*</text>

  <!-- Broker -> Reception (subscribe room.cleaned) -->
  <line x1="380" y1="320" x2="270" y2="180" class="edge-pub" marker-end="url(#arrowDash)"/>

  <!-- Housekeeping -> Broker -->
  <line x1="730" y1="155" x2="620" y2="300" class="edge-pub" marker-end="url(#arrowDash)"/>
  <text x="720" y="220" class="topic-label">room.cleaning_started,</text>
  <text x="720" y="234" class="topic-label">room.cleaned</text>

  <!-- Broker -> Housekeeping (subscribe room.vacated) -->
  <line x1="620" y1="320" x2="730" y2="180" class="edge-pub" marker-end="url(#arrowDash)"/>

  <!-- Room Service -> Broker -->
  <line x1="270" y1="535" x2="380" y2="400" class="edge-pub" marker-end="url(#arrowDash)"/>
  <text x="290" y="480" class="topic-label">order.received,</text>
  <text x="290" y="466" class="topic-label">order.preparing/...</text>

  <!-- Maintenance -> Broker -->
  <line x1="730" y1="535" x2="620" y2="400" class="edge-pub" marker-end="url(#arrowDash)"/>
  <text x="720" y="480" class="topic-label">issue.reported,</text>
  <text x="720" y="466" class="topic-label">issue.assigned/resolved</text>

  <!-- Broker -> Dashboard (subscribe all) -->
  <line x1="500" y1="410" x2="500" y2="490" class="edge-pub" marker-end="url(#arrowDash)"/>
  <text x="555" y="450" class="topic-label">* (barcha)</text>

  <!-- Dashboard WebSocket to clients -->
  <line x1="430" y1="610" x2="430" y2="640" class="edge-ws" marker-end="url(#arrowWS)"/>
  <line x1="570" y1="610" x2="570" y2="640" class="edge-ws" marker-end="url(#arrowWS)"/>
  <text x="365" y="630" font-size="11" fill="#7c3aed" font-weight="600">WebSocket</text>

  <!-- HTTP request from Room Service to Reception (internal) -->
  <path d="M 170 490 Q 170 350 70 200" class="edge"/>
  <text x="100" y="370" font-size="11" fill="#1e293b" font-style="italic">HTTP /internal (to'lov)</text>

  <!-- Legend -->
  <g transform="translate(50, 50)">
    <line x1="0" y1="0" x2="30" y2="0" class="edge-pub"/>
    <text x="40" y="4" font-size="11" fill="#475569">Pub/Sub</text>

    <line x1="100" y1="0" x2="130" y2="0" class="edge"/>
    <text x="140" y="4" font-size="11" fill="#475569">HTTP</text>

    <line x1="180" y1="0" x2="210" y2="0" class="edge-ws"/>
    <text x="220" y="4" font-size="11" fill="#475569">WebSocket</text>
  </g>
</svg>
