<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 850" font-family="Segoe UI, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e293b"/>
    </marker>
    <style>
      .start { fill: #34d399; stroke: #047857; stroke-width: 2; }
      .end { fill: #34d399; stroke: #047857; stroke-width: 2; }
      .process { fill: #bfdbfe; stroke: #1e40af; stroke-width: 2; }
      .decision { fill: #fde68a; stroke: #b45309; stroke-width: 2; }
      .data { fill: #fecaca; stroke: #991b1b; stroke-width: 2; }
      .label { fill: #1e293b; font-weight: 500; text-anchor: middle; }
      .label-bold { fill: #1e293b; font-weight: 700; text-anchor: middle; }
      .label-small { fill: #475569; font-size: 11px; text-anchor: middle; }
      .edge-label { fill: #6b21a8; font-weight: 600; font-size: 11px; }
      .edge { stroke: #1e293b; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <text x="425" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">
    3-Rasm: Texnik Xizmat Ustuvorlik Navbati Algoritmi — Blok-Sxema
  </text>
  <text x="425" y="50" text-anchor="middle" font-size="12" fill="#64748b">
    push() va pop() operatsiyalari, FIFO tiebreaker bilan min-heap asosida
  </text>

  <!-- LEFT: PUSH branch -->
  <text x="220" y="85" text-anchor="middle" font-size="15" font-weight="700" fill="#1e40af">
    PUSH(issue_id, urgency, data)
  </text>

  <ellipse cx="220" cy="115" rx="65" ry="20" class="start"/>
  <text x="220" y="120" class="label-bold">BOSHLASH</text>

  <line x1="220" y1="135" x2="220" y2="160" class="edge" marker-end="url(#arrow3)"/>

  <rect x="80" y="160" width="280" height="50" rx="6" class="process"/>
  <text x="220" y="180" class="label-bold">priority = urgency.priority_value()</text>
  <text x="220" y="198" class="label-small">CRITICAL=0, HIGH=1, NORMAL=2, LOW=3</text>

  <line x1="220" y1="210" x2="220" y2="235" class="edge" marker-end="url(#arrow3)"/>

  <rect x="80" y="235" width="280" height="55" rx="6" class="process"/>
  <text x="220" y="255" class="label-bold">sequence = next(_counter)</text>
  <text x="220" y="273" class="label-small">global atomar hisoblagich</text>
  <text x="220" y="287" class="label-small">(FIFO tiebreaker uchun zarur)</text>

  <line x1="220" y1="290" x2="220" y2="315" class="edge" marker-end="url(#arrow3)"/>

  <rect x="80" y="315" width="280" height="60" rx="6" class="process"/>
  <text x="220" y="335" class="label-bold">entry = _HeapEntry(</text>
  <text x="220" y="352" class="label">priority, sequence,</text>
  <text x="220" y="368" class="label">issue_id, issue_data)</text>

  <line x1="220" y1="375" x2="220" y2="400" class="edge" marker-end="url(#arrow3)"/>

  <rect x="80" y="400" width="280" height="55" rx="6" class="data"/>
  <text x="220" y="420" class="label-bold">heapq.heappush(_heap, entry)</text>
  <text x="220" y="438" class="label-small">O(log n) — heap invariantini saqlaydi</text>
  <text x="220" y="452" class="label-small">Lock ostida — thread-safe</text>

  <line x1="220" y1="455" x2="220" y2="480" class="edge" marker-end="url(#arrow3)"/>

  <ellipse cx="220" cy="500" rx="60" ry="18" class="end"/>
  <text x="220" y="505" class="label-bold">TUGADI</text>

  <!-- RIGHT: POP branch -->
  <text x="620" y="85" text-anchor="middle" font-size="15" font-weight="700" fill="#1e40af">
    POP() — keyingi texnikka tayinlash
  </text>

  <ellipse cx="620" cy="115" rx="65" ry="20" class="start"/>
  <text x="620" y="120" class="label-bold">BOSHLASH</text>

  <line x1="620" y1="135" x2="620" y2="160" class="edge" marker-end="url(#arrow3)"/>

  <polygon points="620,160 770,205 620,250 470,205" class="decision"/>
  <text x="620" y="200" class="label-bold">_heap bo'shmi?</text>

  <line x1="770" y1="205" x2="820" y2="205" class="edge" marker-end="url(#arrow3)"/>
  <text x="790" y="200" class="edge-label">HA</text>
  <rect x="785" y="220" width="60" height="36" rx="6" class="end"/>
  <text x="815" y="243" class="label-bold">None</text>

  <line x1="620" y1="250" x2="620" y2="280" class="edge" marker-end="url(#arrow3)"/>
  <text x="635" y="270" class="edge-label">YO'Q</text>

  <rect x="480" y="280" width="280" height="55" rx="6" class="process"/>
  <text x="620" y="300" class="label-bold">entry = heappop(_heap)</text>
  <text x="620" y="318" class="label-small">O(log n), eng kichik priority + sequence</text>

  <line x1="620" y1="335" x2="620" y2="360" class="edge" marker-end="url(#arrow3)"/>

  <polygon points="620,360 770,405 620,450 470,405" class="decision"/>
  <text x="620" y="400" class="label-bold">entry.issue_id</text>
  <text x="620" y="418" class="label">∈ _removed?</text>

  <!-- Removed: lazy delete -->
  <line x1="470" y1="405" x2="400" y2="405" class="edge" marker-end="url(#arrow3)"/>
  <text x="430" y="400" class="edge-label">HA</text>
  <rect x="270" y="375" width="130" height="60" rx="6" class="process"/>
  <text x="335" y="395" class="label-bold">discard from</text>
  <text x="335" y="412" class="label-bold">_removed</text>
  <text x="335" y="428" class="label-small">(qaytadan urinish)</text>
  <line x1="335" y1="375" x2="335" y2="350" class="edge"/>
  <line x1="335" y1="350" x2="620" y2="350" class="edge" marker-end="url(#arrow3)"/>

  <line x1="620" y1="450" x2="620" y2="475" class="edge" marker-end="url(#arrow3)"/>
  <text x="635" y="470" class="edge-label">YO'Q</text>

  <rect x="480" y="475" width="280" height="50" rx="6" class="process"/>
  <text x="620" y="495" class="label-bold">RETURN entry.issue_data</text>
  <text x="620" y="513" class="label-small">(eng yuqori ustuvorlikdagi muammo)</text>

  <line x1="620" y1="525" x2="620" y2="555" class="edge" marker-end="url(#arrow3)"/>

  <ellipse cx="620" cy="575" rx="60" ry="18" class="end"/>
  <text x="620" y="580" class="label-bold">TUGADI</text>

  <!-- BOTTOM: example trace -->
  <rect x="50" y="620" width="750" height="200" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="425" y="645" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">
    Misol kuzatuv: 6 ta muammo qabul qilindi
  </text>

  <text x="70" y="675" font-size="12" fill="#1e293b" font-weight="600">Qabul tartibi (sequence):</text>
  <text x="70" y="695" font-size="12" fill="#1e293b" font-family="Consolas, monospace">
    ISS-001 (low, 0) → ISS-002 (high, 1) → ISS-003 (critical, 2) →
  </text>
  <text x="70" y="713" font-size="12" fill="#1e293b" font-family="Consolas, monospace">
    ISS-004 (normal, 3) → ISS-005 (high, 4) → ISS-006 (critical, 5)
  </text>

  <text x="70" y="745" font-size="12" fill="#1e293b" font-weight="600">Pop tartibi (algoritm chiqishi):</text>
  <text x="70" y="765" font-size="12" fill="#047857" font-family="Consolas, monospace">
    1. ISS-003 [critical] ← (priority=0, seq=2)  ← eng oldin kelgan critical
  </text>
  <text x="70" y="783" font-size="12" fill="#047857" font-family="Consolas, monospace">
    2. ISS-006 [critical] ← (priority=0, seq=5)
  </text>
  <text x="70" y="801" font-size="12" fill="#047857" font-family="Consolas, monospace">
    3. ISS-002 [high]  4. ISS-005 [high]  5. ISS-004 [normal]  6. ISS-001 [low]
  </text>
</svg>
